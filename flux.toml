[channels]
main = "production"

[tasks.build]
cargo = ["cargo", "build"]
workspace_batchable = true

[tasks.test]
cargo = ["cargo", "test"]
workspace_batchable = true

[tasks.lint]
cargo = ["cargo", "clippy", "--all-targets", "--", "-D", "warnings"]

[tasks.release]
depends_on = ["test", "lint"]
cargo = "ROOT=$(git rev-parse --show-toplevel) && VERSION=$(cargo flux version --root \"$ROOT\") && cargo flux stamp --root \"$ROOT\" \"$VERSION\" && cargo update --workspace --manifest-path \"$ROOT/Cargo.toml\" && cargo fmt --all --manifest-path \"$ROOT/Cargo.toml\" && git -C \"$ROOT\" add -A && git -C \"$ROOT\" commit -m \"chore(release): $VERSION\" && git -C \"$ROOT\" tag \"v$VERSION\" -m \"Release $VERSION\" && git -C \"$ROOT\" push origin HEAD \"v$VERSION\" && cargo publish"
