name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      # Nightly is installed only for the `fmt` check (rustfmt.toml uses
      # nightly-only import grouping). It is not made the default toolchain, so
      # every other task runs on stable via `cargo`; `fmt` reaches it explicitly
      # with `cargo +nightly fmt`.
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - run: cargo install cargo-flux
      - run: cargo flux run fmt
      - run: cargo flux run check
      - run: cargo flux run check-wasm
      - run: cargo flux run lint
      - run: cargo flux run test
