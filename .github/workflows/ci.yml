name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      # `fmt` is intentionally not a CI gate: it is auto-fixable, would only fail
      # after a merge if run on main-push, and requires a nightly toolchain just
      # for rustfmt.toml's nightly-only import grouping. Run it locally with
      # `cargo flux run fmt`. Everything below runs on stable.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - run: cargo install cargo-flux
      - run: cargo flux run check
      - run: cargo flux run check-wasm
      - run: cargo flux run check-wasm-features
      - run: cargo flux run lint
      - run: cargo flux run test
